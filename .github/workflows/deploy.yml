name: Deploy to HF Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git push --force https://mfvargas:$HF_TOKEN@huggingface.co/spaces/mfvargas/geovisor-fincaolga main
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
