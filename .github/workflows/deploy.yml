name: Deploy to HF Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git push https://mfvargas:$HF_TOKEN@huggingface.co/spaces/mfvargas/geovisor-fincaolga main
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - run: |
          pip install huggingface-hub -q
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.restart_space('mfvargas/geovisor-fincaolga')
          print('Space reiniciado')
          "
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
